# ============================================================
# AirLens — Cloud Run 배포 워크플로우
# ============================================================
# API 서버를 GCP Cloud Run에 자동 배포합니다.
# main 브랜치 push 시 또는 수동 트리거로 실행됩니다.
# ============================================================

name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'ml/api/**'
      - 'ml/models/**'
      - 'ml/configs/**'
      - 'ml/docker/Dockerfile'
      - 'ml/requirements-api.txt'
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: airlens-api
  REGION: asia-northeast3  # 서울 리전

jobs:
  # ── 테스트 ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r ml/requirements-api.txt
          pip install pytest pytest-cov numpy

      - name: Run tests
        run: |
          python -m pytest ml/tests/ -v --tb=short
        env:
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}

  # ── 빌드 & 배포 ────────────────────────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    permissions:
      contents: read
      id-token: write  # Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            --target api-server \
            -f ml/docker/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/airlens/${{ env.SERVICE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/airlens/${{ env.SERVICE_NAME }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/airlens/${{ env.SERVICE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/airlens/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/airlens/${{ env.SERVICE_NAME }}:${{ github.sha }}
          env_vars: |
            LOG_LEVEL=INFO
          secrets: |
            OPENAQ_API_KEY=OPENAQ_API_KEY:latest
            WAQI_TOKEN=WAQI_TOKEN:latest
            EARTHDATA_TOKEN=EARTHDATA_TOKEN:latest
          flags: |
            --memory=1Gi
            --cpu=1
            --min-instances=0
            --max-instances=5
            --concurrency=80
            --timeout=300

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format='value(status.url)')
          echo "🚀 Deployed to: $SERVICE_URL"
          curl -sf "$SERVICE_URL/health" || exit 1
          echo "✅ Health check passed"

      - name: Notify Slack
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
