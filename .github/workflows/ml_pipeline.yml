# ============================================================
# AirLens — ML 예측 파이프라인 워크플로우
# ============================================================
# 매주 월요일 02:00 UTC 또는 수동 트리거
# 실행 결과: app/data/predictions/predicted_grid.json 생성 후 자동 배포
# ============================================================

name: ML Prediction Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1'   # 매주 월요일 02:00 UTC

permissions:
  contents: write

jobs:
  ml-predict:
    name: 'Generate ML Predictions'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ML dependencies
        run: |
          pip install xgboost>=2.0 scikit-learn>=1.3 pandas>=2.0 \
                      numpy>=1.24 requests pyyaml joblib \
                      --break-system-packages

      - name: Create output directories
        run: |
          mkdir -p app/data/predictions
          mkdir -p ml/models/aod_pm25

      - name: Run prediction pipeline
        env:
          OPENAQ_API_KEY: ${{ secrets.OPENAQ_API_KEY }}
          WAQI_TOKEN: ${{ secrets.WAQI_TOKEN }}
        run: |
          python ml/scripts/predict_grid.py \
            --config ml/configs/model_params.yaml \
            --output app/data/predictions/predicted_grid.json
        timeout-minutes: 20

      - name: Validate output
        run: |
          python -c "
          import json, sys
          with open('app/data/predictions/predicted_grid.json') as f:
              data = json.load(f)
          print(f'✅ 예측 데이터: {len(data.get(\"predictions\", []))} 격자점')
          "

      - name: Commit & Push predictions
        run: |
          git config user.name "airlens-ml-bot"
          git config user.email "airlens-ml-bot@users.noreply.github.com"
          git add app/data/predictions/
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Update ML predictions [$(date +'%Y-%m-%d')]"
            for i in 1 2 3; do
              git pull --rebase origin main && git push origin main && echo "✅ Pushed" && exit 0
              sleep 5
            done
            exit 1
          else
            echo "ℹ️  No prediction changes"
          fi
