name: Update Air Quality & Satellite Data

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Earthdata AOD
        env:
          EARTHDATA_USER: ${{ secrets.EARTHDATA_USER }}
          EARTHDATA_PASS: ${{ secrets.EARTHDATA_PASS }}
        run: python AirLens/scripts/python/fetch_earthdata_aod.py

      - name: Fetch OpenAQ & WAQI
        run: |
          # If other scripts are ready, run them here
          python AirLens/scripts/python/fetch_openaq.py || echo "OpenAQ script failed but continuing..."

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "data: periodic update of satellite and air quality data [skip ci]" && git push)
